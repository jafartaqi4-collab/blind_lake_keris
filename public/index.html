<style>

  :root{
    --lake:#1FA9A0;
    --lake-deep:#0E7A73;
    --dusk:#16242E;
    --amber:#B9793A;
    --sand:#F4EEDF;
    --ice:#D8ECE9;
    --ink:#152321;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -10%, #234a4a 0%, transparent 60%),
      var(--dusk);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .phone{
    width:100%;
    max-width:430px;
    height:92vh;
    max-height:820px;
    background:var(--sand);
    border-radius:28px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 40px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    position:relative;
  }

    background-size:cover;
    background-position:center;
    color:var(--sand);
    padding:18px 20px 16px;
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(115deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .title-row{display:flex;align-items:center;gap:12px;}
  .lake-mark{
    width:42px;height:42px;border-radius:50%;
    background:var(--sand);
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:700;color:var(--lake-deep);font-size:18px;
    flex-shrink:0;
  }
  .title-block h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:17px;
    margin:0;
    line-height:1.2;
    letter-spacing:0.2px;
  }
  .title-block p{
    margin:2px 0 0;
    font-size:11.5px;
    opacity:0.85;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.3px;
  }
  .free-badge{
    position:absolute;
    top:16px;right:18px;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.35);
    color:var(--sand);
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;
    letter-spacing:0.5px;
    padding:4px 8px;
    border-radius:20px;
  }

  /* route waypoints — the signature element */
  .route{
    display:flex;
    align-items:center;
    margin-top:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    position:relative;
    z-index:1;
  }
  .route .stop{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:64px;}
  .route .dot{width:7px;height:7px;border-radius:50%;background:var(--sand);margin-bottom:5px;}
  .route .dot.mid{background:var(--amber);}
  .route .photo-dot{
    width:34px;height:34px;border-radius:50%;
    object-fit:cover;
    border:2px solid var(--sand);
    margin-bottom:5px;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);
  }
  .route .line{flex:1;height:1px;background:repeating-linear-gradient(90deg, rgba(255,255,255,0.7) 0 4px, transparent 4px 8px);margin:0 -4px 15px;}
  .route span{opacity:0.9;text-align:center;line-height:1.25;}

  /* Chat area */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 14px 10px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:
      linear-gradient(var(--sand),var(--sand)),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(22,36,46,0.035) 39px 40px);
  }
  .bubble{
    max-width:82%;
    padding:10px 13px;
    font-size:14.5px;
    line-height:1.48;
    border-radius:14px;
    animation:rise 0.25s ease;
    white-space:pre-wrap;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .bubble.user{
    align-self:flex-end;
    background:var(--lake);
    color:#fff;
    border-bottom-right-radius:3px;
  }
  .bubble.bot{
    align-self:flex-start;
    background:#fff;
    border:1px solid #e6ddc6;
    border-left:3px solid var(--amber);
    color:var(--ink);
    border-bottom-left-radius:3px;
  }
  .bubble.bot.rtl, .bubble.user.rtl{
    font-family:'Noto Nastaliq Urdu',serif;
    direction:rtl;
    text-align:right;
    font-size:16px;
    line-height:2;
  }
  .typing{
    align-self:flex-start;
    display:flex;gap:4px;
    padding:12px 14px;
    background:#fff;border:1px solid #e6ddc6;border-left:3px solid var(--amber);
    border-radius:14px;border-bottom-left-radius:3px;
  }
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--lake-deep);opacity:0.4;animation:blink 1.1s infinite;}
  .typing span:nth-child(2){animation-delay:0.15s;}
  .typing span:nth-child(3){animation-delay:0.3s;}
  @keyframes blink{0%,80%,100%{opacity:0.25;}40%{opacity:0.9;}}

  .quick{
    display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px;
  }
  .quick button{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    padding:6px 10px;
    background:var(--ice);
    border:1px solid #bcdedb;
    color:var(--lake-deep);
    border-radius:999px;
    cursor:pointer;
  }
  .quick button:hover{background:#c3e5e1;}

  .inputbar{
    display:flex;
    gap:8px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:#EDE6D2;
    border-top:1px solid #ddd2b3;
  }
  .inputbar input{
    flex:1;
    border:none;
    border-radius:20px;
    padding:11px 15px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    background:#fff;
    outline:none;
  }
  .inputbar button{
    width:42px;height:42px;border-radius:50%;
    background:var(--lake-deep);
    border:none;color:#fff;font-size:16px;
    cursor:pointer;flex-shrink:0;
  }
  .inputbar button:disabled{opacity:0.4;}

  .mic-btn{
    width:42px;height:42px;border-radius:50%;
    background:var(--ice);
    border:1px solid #bcdedb;color:var(--lake-deep);font-size:16px;
    cursor:pointer;flex-shrink:0;
  }
  .mic-btn.listening{
    background:#e05252;border-color:#e05252;color:#fff;
    animation:pulse 1s infinite;
  }
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,82,82,0.5);}50%{box-shadow:0 0 0 8px rgba(224,82,82,0);}}

  .speak-toggle{
    position:absolute;top:16px;left:18px;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.35);
    color:var(--sand);
    font-family:'IBM Plex Mono',monospace;
    font-size:9px;letter-spacing:0.5px;
    padding:4px 8px;border-radius:20px;
    cursor:pointer;
  }
  .speak-toggle.off{opacity:0.5;}

  .chat::-webkit-scrollbar{width:5px;}
  .chat::-webkit-scrollbar-thumb{background:#cfc4a1;border-radius:3px;}
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <div class="free-badge">FREE · GEMINI AI</div>
    <button class="speak-toggle" id="speakToggle">🔊 VOICE ON</button>

  <div class="chat" id="chat"></div>
  <div class="quick" id="quick">
    <button data-q="What tickets do you offer and how much do they cost?">Ticket prices</button>
    <button data-q="What food and drinks are available at the lake?">Food & drinks</button>
    <button data-q="How do I get to Blind Lake Keris?">Directions</button>
    <button data-q="بوٹنگ ٹکٹ کتنے کا ہے؟">بوٹنگ ٹکٹ</button>
  </div>
  <div class="inputbar">
    <input id="input" type="text" placeholder="Ask about Blind Lake Keris…" />
    <button class="mic-btn" id="micBtn" title="Speak your question">🎤</button>
    <button id="send">➤</button>
  </div>
</div>

<script>
// The knowledge base now lives securely on the server (server.js) —
// this page only talks to our own backend at /api/chat, never to Anthropic directly.
let history = [];
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const quickEl = document.getElementById('quick');
const micBtn = document.getElementById('micBtn');
const speakToggle = document.getElementById('speakToggle');

let voiceEnabled = true;
speakToggle.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  speakToggle.textContent = voiceEnabled ? '🔊 VOICE ON' : '🔇 VOICE OFF';
  speakToggle.classList.toggle('off', !voiceEnabled);
  if (!voiceEnabled) window.speechSynthesis.cancel();
});

function isUrduText(text){ return /[\u0600-\u06FF]/.test(text); }

// ---- Text-to-speech: reads bot replies aloud ----
let availableVoices = [];
let urduVoiceAvailable = false;
let preferredUrduVoice = null;
function loadVoices(){
  availableVoices = window.speechSynthesis.getVoices();
  const urduVoices = availableVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('ur'));
  urduVoiceAvailable = urduVoices.length > 0;
  // Prefer a voice explicitly tagged Pakistani Urdu (ur-PK) over any other Urdu variant (e.g. ur-IN)
  preferredUrduVoice =
    urduVoices.find(v => v.lang.toLowerCase() === 'ur-pk') ||
    urduVoices.find(v => v.name.toLowerCase().includes('pakistan')) ||
    urduVoices[0] || null;
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

// Mobile browsers require speech to start inside a direct user-gesture handler.
// This "unlocks" audio the first time the visitor taps mic or send.
let audioUnlocked = false;
function unlockAudio(){
  if (audioUnlocked || !('speechSynthesis' in window)) return;
  const silent = new SpeechSynthesisUtterance(' ');
  silent.volume = 0;
  window.speechSynthesis.speak(silent);
  audioUnlocked = true;
}

function speak(text){
  if (!voiceEnabled || !('speechSynthesis' in window)) return;
  const wantsUrdu = isUrduText(text);
  if (wantsUrdu && !urduVoiceAvailable) {
    // This phone has no Urdu voice installed — speaking would silently fail.
    console.warn('No Urdu voice installed on this device — skipping speech for Urdu text.');
    return;
  }
  window.speechSynthesis.cancel(); // stop any previous speech first
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = wantsUrdu ? 'ur-PK' : 'en-US';
  if (wantsUrdu && preferredUrduVoice) {
    utterance.voice = preferredUrduVoice; // explicitly use the Pakistani Urdu voice if available
  }
  utterance.rate = 0.95;
  window.speechSynthesis.speak(utterance);
}

// ---- Speech-to-text: lets the visitor speak their question ----
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognitionAPI) {
  recognition = new SpeechRecognitionAPI();
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '⏹';
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
  };
  recognition.onerror = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
  };
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    inputEl.value = transcript;
    sendMessage(transcript);
  };

  micBtn.addEventListener('click', () => {
    unlockAudio();
    if (isListening) {
      recognition.stop();
      return;
    }
    // Try Urdu first since most visitors use Urdu; browser falls back gracefully if unsupported.
    recognition.lang = 'ur-PK';
    try { recognition.start(); } catch(e) { /* already started */ }
  });
} else {
  micBtn.style.display = 'none'; // hide mic button if browser doesn't support voice input
}

function addBubble(text, role){
  const b = document.createElement('div');
  const isUrdu = isUrduText(text);
  b.className = 'bubble ' + role + (isUrdu ? ' rtl' : '');
  // Turn any URL in the message into a tappable link (so Google Maps links open directly)
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  b.innerHTML = escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">$1</a>');
  chatEl.appendChild(b);
  chatEl.scrollTop = chatEl.scrollHeight;
  return b;
}

function addTyping(){
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typing-indicator';
  t.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(t);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function removeTyping(){
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

async function sendMessage(text){
  if(!text.trim()) return;
  addBubble(text, 'user');
  history.push({role:'user', content:text});
  inputEl.value='';
  sendBtn.disabled = true;
  quickEl.style.display = 'none';
  addTyping();

  try{
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.reply?.trim() || "Sorry, I couldn't fetch a response just now.";
    addBubble(reply, 'bot');
    speak(reply);
    history.push({role:'assistant', content:reply});
  }catch(err){
    removeTyping();
    addBubble("Connection error — please try again.", 'bot');
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', ()=> { unlockAudio(); sendMessage(inputEl.value); });
inputEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ unlockAudio(); sendMessage(inputEl.value); } });
quickEl.addEventListener('click', e=>{
  if(e.target.tagName==='BUTTON'){ unlockAudio(); sendMessage(e.target.getAttribute('data-q')); }
});

// Greeting
const greetingText = "Assalam-o-Alaikum! 🏔️ Welcome to Blind Lake Keris (Jarba-Tso Keris). Ask me about tickets, activities, food, or directions — or tap a quick question below.";
addBubble(greetingText, 'bot');
</script>
